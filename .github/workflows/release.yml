name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  DOTNET_VERSION: '10.0.x'

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: 🔥 Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: 🔧 Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: 📦 Restore dependencies
      run: dotnet restore

    - name: 🗃️ Build Release
      run: dotnet build --configuration Release --no-restore

    - name: 🧪 Run Tests
      run: |
        dotnet test tests/IrcChat.Api.Tests/IrcChat.Api.Tests.csproj \
          --configuration Release \
          --no-build
        
        dotnet test tests/IrcChat.Client.Tests/IrcChat.Client.Tests.csproj \
          --configuration Release \
          --no-build

    - name: 📦 Publish API
      run: |
        dotnet publish src/IrcChat.Api/IrcChat.Api.csproj \
          -c Release \
          -o release/api \
          /p:PublishSingleFile=true \
          /p:PublishTrimmed=true \
          /p:IncludeNativeLibrariesForSelfExtract=true

    - name: 📦 Publish Client
      run: |
        dotnet publish src/IrcChat.Client/IrcChat.Client.csproj \
          -c Release \
          -o release/client \
          /p:BlazorEnableCompression=true

    - name: 📋 Extract version from tag
      id: version
      run: |
        VERSION=${GITHUB_REF#refs/tags/v}
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

    - name: 📦 Create release archives
      run: |
        cd release/api
        zip -r ../ircchat-api-${{ steps.version.outputs.version }}.zip .
        cd ../client
        zip -r ../ircchat-client-${{ steps.version.outputs.version }}.zip .
        cd ..    

    - name: 📊 Generate detailed changelog from PRs
      id: detailed_changelog
      uses: mikepenz/release-changelog-builder-action@6faf020194b7c8853f9e55c4fd92e40b02122a04
      with:
        outputFile: CHANGELOG.md
        configurationJson: |
          {
            "template": "## 📋 Changes\n\n#{{CHANGELOG}}\n\n---\n\n### 📦 Downloads\n\n- `ircchat-api-${{ steps.version.outputs.version }}.zip` - Backend API\n- `ircchat-client-${{ steps.version.outputs.version }}.zip` - Frontend Blazor\n\n### 📚 Links\n\n- [Full Documentation](https://github.com/${{ github.repository }})\n- [Installation Guide](https://github.com/${{ github.repository }}/blob/main/README.md)\n- [SonarCloud](https://sonarcloud.io/project/overview?id=${{ vars.SONAR_PROJECT_KEY }})\n\n**Full Changelog**: https://github.com/${{ github.repository }}/compare/#{{FROM_TAG}}...${{ steps.version.outputs.tag }}",
            "categories": [
              {
                "title": "### ✨ Features",
                "labels": ["enhancement", "feature"]
              },
              {
                "title": "### 🐛 Bug Fixes",
                "labels": ["bug", "fix"]
              },
              {
                "title": "### 📝 Documentation",
                "labels": ["documentation", "docs"]
              },
              {
                "title": "### 🧪 Tests",
                "labels": ["test", "tests"]
              },
              {
                "title": "### 🔧 Maintenance",
                "labels": ["chore", "dependencies"]
              },
              {
                "title": "### 🚀 Performance",
                "labels": ["performance", "perf"]
              },
              {
                "title": "### 🔒 Security",
                "labels": ["security"]
              }
            ],
            "ignore_labels": ["changelog:exclude"]
          }
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: 🎉 Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        name: Release ${{ steps.version.outputs.tag }}
        body: |
          ${{ steps.changelog.outputs.content }}
          
          ---
          
          ${{ steps.detailed_changelog.outputs.changelog }}
        files: |
          release/ircchat-api-${{ steps.version.outputs.version }}.zip
          release/ircchat-client-${{ steps.version.outputs.version }}.zip
        draft: false
        prerelease: ${{ contains(steps.version.outputs.tag, '-alpha') || contains(steps.version.outputs.tag, '-beta') || contains(steps.version.outputs.tag, '-rc') }}
        generate_release_notes: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: 📢 Release Summary
      if: success()
      run: |
        echo "✅ Release ${{ steps.version.outputs.tag }} created successfully!"
        echo "📦 API: ircchat-api-${{ steps.version.outputs.version }}.zip"
        echo "📦 Client: ircchat-client-${{ steps.version.outputs.version }}.zip"
        echo "🔗 https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.tag }}"